<!DOCTYPE html>
<html lang="ja" style="background:#ffffff; color-scheme:light;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light">
<title>BIG5 パーソナリティ探索</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ダークモード強制無効化 */
  html, body, #root {
    color-scheme: light !important;
    background-color: #ffffff !important;
    color: #111111 !important;
  }
  @media (prefers-color-scheme: dark) {
    html, body {
      background-color: #ffffff !important;
      color: #111111 !important;
    }
  }

  :root {
    color-scheme: light !important;
    --openness: #E05A6A;
    --extraversion: #F5933A;
    --conscientiousness: #A8CC4A;
    --neuroticism: #4ABDE0;
    --agreeableness: #8B5FC5;
    --bg: #ffffff;
    --surface: #F2F2F7;
    --surface2: #E5E5EA;
    --text: #111111;
    --text-dim: #888888;
  }

  body {
    background: #ffffff !important;
    color: #111111 !important;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 28px 20px 12px;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #000000;
  }

  /* ===== WHEEL ===== */
  #wheel-container {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 16px auto 0;
    flex-shrink: 0;
  }
  #wheel-svg {
    width: 100%;
    height: 100%;
    cursor: pointer;
  }
  .trait-slice {
    transition: opacity 0.25s, filter 0.25s;
  }
  .trait-slice:hover { filter: brightness(1.15); }
  .trait-slice.active { filter: brightness(1.2) drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
  .trait-slice.dimmed { opacity: 0.3; }

  /* center circle */
  #center-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 76px; height: 76px;
    background: var(--bg);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: all 0.3s;
    border: 2px solid #DDDDDD;
  }
  #center-label .num {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
  }
  #center-label .label-txt {
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  /* ===== FACET PANEL ===== */
  #facet-panel {
    width: 100%;
    max-width: 380px;
    padding: 0 16px 16px;
    flex: 1;
  }

  #panel-header {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 14px 0 10px;
    cursor: pointer;
  }
  #panel-header.visible { display: flex; }
  #panel-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #panel-title {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #000000;
  }
  #back-btn {
    margin-left: auto;
    font-size: 0.72rem;
    color: #555555;
    background: #EEEEEE;
    border: none;
    border-radius: 20px;
    padding: 4px 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #back-btn:hover { background: #DDDDDD; }

  #panel-desc {
    font-size: 0.78rem;
    color: #333333;
    line-height: 1.6;
    margin-bottom: 12px;
    display: none;
  }
  #panel-desc.visible { display: block; }

  /* Facet Cards */
  #facets-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #facets-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .facet-card {
    background: var(--accent);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    border: 1.5px solid transparent;
    animation: slideIn 0.25s ease both;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .facet-card:active { filter: brightness(1.08); }

  /* 展開時：常時ハイライト */
  .facet-card.expanded {
    filter: brightness(1.12);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-10px); }
  }

  .facet-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .facet-name {
    font-size: 0.92rem;
    font-weight: 600;
    color: rgba(255,255,255,0.78);
    transition: color 0.25s;
    text-decoration: none;
    border-bottom: none;
    outline: none;
    -webkit-user-select: none;
  }
  /* 展開時は文字を白く（常時） */
  .facet-card.expanded .facet-name {
    color: #ffffff;
  }

  .facet-arrow {
    margin-left: auto;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.7);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .facet-card.expanded .facet-arrow { transform: rotate(90deg); }

  /* ファセット詳細：max-heightで展開/収縮 */
  .facet-detail {
    max-height: 0;
    overflow: hidden;
    margin-top: 0;
    padding-top: 0;
    border-top: none;
    transition:
      max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
      margin-top 0.35s ease,
      padding-top 0.35s ease;
  }
  .facet-card.expanded .facet-detail {
    max-height: 500px;
    margin-top: 12px;
    padding-top: 12px;
    transition:
      max-height 0.35s cubic-bezier(0, 0, 0.2, 1),
      margin-top 0.35s ease,
      padding-top 0.35s ease;
  }

  .facet-tagline {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.85);
    line-height: 1.55;
    margin-bottom: 10px;
  }

  .level-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .level-box {
    border-radius: 8px;
    padding: 8px 10px;
  }
  .level-box.high { background: rgba(255,255,255,0.22); }
  .level-box.low  { background: rgba(0,0,0,0.15); }
  .level-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    color: rgba(255,255,255,0.95);
  }
  .level-text {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.9);
    line-height: 1.5;
  }

  /* Hint at bottom */
  #hint {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text-dim);
    padding: 20px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  #hint.hidden { display: none; }
</style>
</head>

const TRAITS = ['openness','extraversion','conscientiousness','neuroticism','agreeableness'];
const TRAIT_NAMES_SHORT = { openness:'開放性', extraversion:'外向性', conscientiousness:'誠実性', neuroticism:'精神安定性', agreeableness:'協調性' };

let activeTraitKey = null;
let expandedFacetIndex = null;

// ===== Draw SVG Wheel =====
function buildWheel() {
  const svg = document.getElementById('wheel-svg');
  const cx = 160, cy = 160;
  const outerR = 150, innerR = 44, gap = 3;
  const n = TRAITS.length;
  const anglePerSlice = (2 * Math.PI) / n;
  const startOffset = -Math.PI / 2;

  TRAITS.forEach((key, i) => {
    const trait = DATA[key];
    const startAngle = startOffset + i * anglePerSlice + gap / outerR;
    const endAngle = startOffset + (i + 1) * anglePerSlice - gap / outerR;

    const x1 = cx + outerR * Math.cos(startAngle);
    const y1 = cy + outerR * Math.sin(startAngle);
    const x2 = cx + outerR * Math.cos(endAngle);
    const y2 = cy + outerR * Math.sin(endAngle);
    const x3 = cx + innerR * Math.cos(endAngle);
    const y3 = cy + innerR * Math.sin(endAngle);
    const x4 = cx + innerR * Math.cos(startAngle);
    const y4 = cy + innerR * Math.sin(startAngle);

    const d = `M ${x1} ${y1} A ${outerR} ${outerR} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${innerR} ${innerR} 0 0 0 ${x4} ${y4} Z`;

    const midAngle = startOffset + (i + 0.5) * anglePerSlice;
    const labelR = (outerR + innerR) / 2;
    const lx = cx + labelR * Math.cos(midAngle);
    const ly = cy + labelR * Math.sin(midAngle);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'trait-slice');
    g.setAttribute('data-key', key);
    g.style.cursor = 'pointer';

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', trait.color);
    g.appendChild(path);

    // Label text (split long names)
    const name = TRAIT_NAMES_SHORT[key];
    const lines = name.length > 4 ? [name.slice(0,3), name.slice(3)] : [name];
    lines.forEach((line, li) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', lx);
      t.setAttribute('y', ly + (li - (lines.length - 1) / 2) * 16);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('dominant-baseline', 'middle');
      t.setAttribute('fill', '#fff');
      t.setAttribute('font-size', '13');
      t.setAttribute('font-weight', '700');
      t.setAttribute('font-family', 'Hiragino Kaku Gothic ProN, sans-serif');
      t.setAttribute('pointer-events', 'none');
      t.textContent = line;
      g.appendChild(t);
    });

    g.addEventListener('click', () => selectTrait(key));
    svg.appendChild(g);
  });
}

// 下から上へ順番にmax-heightで畳む（スペースが縮んで画面が自然に上に戻る）
function collapseGrid(callback) {
  const grid = document.getElementById('facets-grid');
  const cards = Array.from(grid.children);
  if (!cards.length) { callback(); return; }

  // 開いているファセット詳細を先に閉じる
  grid.querySelectorAll('.facet-card.expanded').forEach(c => c.classList.remove('expanded'));

  const stagger = 60;   // カード間の遅延
  const duration = 250; // 各カードの収縮時間

  cards.forEach((card, i) => {
    const reverseIndex = cards.length - 1 - i; // 下から順
    const delay = reverseIndex * stagger;

    // 現在の高さを固定してからmax-height:0へ
    const h = card.offsetHeight;
    card.style.overflow = 'hidden';
    card.style.maxHeight = h + 'px';
    card.style.marginBottom = '0';
    card.style.transition = 'none';

    setTimeout(() => {
      card.style.transition = `max-height ${duration}ms cubic-bezier(0.4, 0, 1, 1), margin-top ${duration}ms ease, opacity ${duration}ms ease`;
      card.style.maxHeight = '0';
      card.style.marginTop = '0';
      card.style.opacity = '0';
    }, delay);
  });

  const totalTime = (cards.length - 1) * stagger + duration;
  setTimeout(() => {
    grid.innerHTML = '';
    callback();
  }, totalTime + 50);
}

function selectTrait(key) {
  if (activeTraitKey === key) {
    // 同じ因子タップ → 収縮モーション付きで閉じてからトップへ戻る
    collapseGrid(() => {
      activeTraitKey = null;
      expandedFacetIndex = null;
      document.querySelectorAll('.trait-slice').forEach(g => g.classList.remove('active','dimmed'));
      const centerLabel = document.getElementById('center-label');
      centerLabel.style.borderColor = '';
      centerLabel.querySelector('.num').textContent = '5';
      centerLabel.querySelector('.num').style.color = '';
      centerLabel.querySelector('.label-txt').textContent = 'TRAITS';
      document.getElementById('panel-header').classList.remove('visible');
      document.getElementById('panel-desc').classList.remove('visible');
      document.getElementById('hint').classList.remove('hidden');
    });
    return;
  }

  const doSelect = () => {
    activeTraitKey = key;
    expandedFacetIndex = null;

    document.querySelectorAll('.trait-slice').forEach(g => {
      const k = g.getAttribute('data-key');
      g.classList.toggle('active', k === key);
      g.classList.toggle('dimmed', k !== key);
    });

    const trait = DATA[key];
    const centerLabel = document.getElementById('center-label');
    centerLabel.style.borderColor = trait.color;
    centerLabel.querySelector('.num').textContent = '6';
    centerLabel.querySelector('.num').style.color = trait.color;
    centerLabel.querySelector('.label-txt').textContent = 'FACETS';

    const header = document.getElementById('panel-header');
    header.classList.add('visible');
    document.getElementById('panel-dot').style.background = trait.color;
    document.getElementById('panel-title').textContent = trait.name;
    const descEl = document.getElementById('panel-desc');
    descEl.textContent = trait.description;
    descEl.classList.add('visible');

    document.getElementById('hint').classList.add('hidden');

    renderFacets(key);
    document.getElementById('facet-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  if (activeTraitKey) {
    // 別の因子タップ → 即座にグリッドをクリアして切り替え（収縮モーションなし）
    document.getElementById('facets-grid').innerHTML = '';
    doSelect();
  } else {
    doSelect();
  }
}

function clearSelection() {
  // 戻るボタン → 収縮モーション付きで閉じてからトップへ戻る
  collapseGrid(() => {
    activeTraitKey = null;
    expandedFacetIndex = null;
    document.querySelectorAll('.trait-slice').forEach(g => g.classList.remove('active', 'dimmed'));
    const centerLabel = document.getElementById('center-label');
    centerLabel.style.borderColor = '';
    centerLabel.querySelector('.num').textContent = '5';
    centerLabel.querySelector('.num').style.color = '';
    centerLabel.querySelector('.label-txt').textContent = 'TRAITS';
    document.getElementById('panel-header').classList.remove('visible');
    document.getElementById('panel-desc').classList.remove('visible');
    document.getElementById('hint').classList.remove('hidden');
  });
}

function renderFacets(key) {
  const trait = DATA[key];
  const grid = document.getElementById('facets-grid');
  grid.innerHTML = '';

  // Set CSS accent
  document.documentElement.style.setProperty('--accent', trait.color);

  trait.facets.forEach((facet, i) => {
    const card = document.createElement('div');
    card.className = 'facet-card';
    card.style.animationDelay = `${i * 50}ms`;

    card.innerHTML = `
      <div class="facet-card-header">
        <span class="facet-name">${facet.name}</span>
        <span class="facet-arrow">▶</span>
      </div>
      <div class="facet-detail">
        <p class="facet-tagline">${facet.desc}</p>
        <div class="level-row">
          <div class="level-box high">
            <div class="level-label">▲ 高い人</div>
            <div class="level-text">${facet.high}</div>
          </div>
          <div class="level-box low">
            <div class="level-label">▼ 低い人</div>
            <div class="level-text">${facet.low}</div>
          </div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => {
      const wasExpanded = card.classList.contains('expanded');
      const currentExpanded = grid.querySelector('.facet-card.expanded');

      if (currentExpanded && currentExpanded !== card) {
        // 別のカードが開いている → 先に閉じてから開く
        currentExpanded.classList.remove('expanded');
        setTimeout(() => {
          if (!wasExpanded) card.classList.add('expanded');
        }, 200);
      } else {
        // 同じカード or 何も開いていない → 即トグル
        if (!wasExpanded) card.classList.add('expanded');
        else card.classList.remove('expanded');
      }
    });

    grid.appendChild(card);
  });
}

document.getElementById('back-btn').addEventListener('click', clearSelection);

buildWheel();
</script>
</body>
</html>
